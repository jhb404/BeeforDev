name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── 1. Testes, type-check, bump de versão e criação da tag ──────────────────
  prepare:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: |
          npx tsc --noEmit
          npx tsc --noEmit -p tsconfig.main.json

      - name: Test
        run: npx vitest run

      - name: Config git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch + tag
        id: bump
        run: |
          git fetch --tags --force origin
          current=$(node -p "require('./package.json').version")
          if git rev-parse "v$current" >/dev/null 2>&1; then
            echo "Tag v$current already exists — bumping patch."
            npm version patch -m "chore: release v%s [skip ci]"
          else
            echo "Tag v$current missing — creating tag without bump."
            git tag -a "v$current" -m "chore: release v$current [skip ci]"
          fi
          new_ver=$(node -p "require('./package.json').version")
          echo "tag=v${new_ver}" >> "$GITHUB_OUTPUT"

      - name: Push commit + tag
        run: git push origin main --follow-tags || git push origin --tags

  # ── 2a. Build Windows (.exe) ─────────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright (Windows)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-win-${{ hashFiles('package-lock.json') }}

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build and publish Windows
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2b. Build macOS (.dmg) ───────────────────────────────────────────────────
  build-mac:
    needs: prepare
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-mac-${{ hashFiles('package-lock.json') }}

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build and publish macOS
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Publica os drafts após ambos os builds concluírem ────────────────────
  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish all draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          drafts=$(gh api repos/$REPO/releases --jq '.[] | select(.draft==true) | .id')
          for id in $drafts; do
            echo "Publishing draft release $id"
            gh api -X PATCH repos/$REPO/releases/$id -f draft=false
          done
