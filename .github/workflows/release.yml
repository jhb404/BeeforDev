name: Release

on:
  push:
    branches: [main]

# Avoid concurrent releases from rapid merges
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    # Skip if last commit was the bump itself (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: |
          npx tsc --noEmit
          npx tsc --noEmit -p tsconfig.main.json

      - name: Test
        run: npx vitest run

      - name: Config git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch + tag
        shell: bash
        run: |
          git fetch --tags --force origin
          current=$(node -p "require('./package.json').version")
          if git rev-parse "v$current" >/dev/null 2>&1; then
            echo "Tag v$current already exists — bumping patch."
            npm version patch -m "chore: release v%s [skip ci]"
          else
            echo "Tag v$current missing — creating tag without bump."
            git tag -a "v$current" -m "chore: release v$current [skip ci]"
          fi

      - name: Push commit + tag
        shell: bash
        run: |
          git push origin main --follow-tags || git push origin --tags

      - name: Build and publish
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish all draft releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          drafts=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.draft==true) | .id')
          for id in $drafts; do
            echo "Publishing draft release $id"
            gh api -X PATCH repos/${{ github.repository }}/releases/$id -f draft=false
          done
