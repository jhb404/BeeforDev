name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: |
          npx tsc --noEmit
          npx tsc --noEmit -p tsconfig.main.json

      - name: Lint
        run: npx eslint src --max-warnings 0

      - name: Test
        run: npx vitest run
